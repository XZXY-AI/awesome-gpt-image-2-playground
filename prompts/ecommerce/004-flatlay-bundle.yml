  zh-CN: "套装平铺俯拍(电商套装主图)"
category: ecommerce
tags: [flatlay, bundle, set, top-down, gift]
intent: "电商套装主图 / 礼盒图 / 详情页平铺"
prompt: |
  A perfect top-down flat-lay photograph of a complete [PRODUCT_SET] arranged on
  [BACKGROUND_SURFACE]. Items are spaced evenly with deliberate negative space, suggesting
  a curated gift set. Soft directional shadows from upper left at 30°, no overhead glare.
  Color palette: warm neutrals with a single accent color [ACCENT_COLOR]. Each item is
  in pristine condition, label/branding facing up. Includes 1-2 organic accents like
  [ACCENT_PROPS]. Composition follows the rule of thirds, with the hero item slightly
  off-center to the right. 1:1 aspect ratio. Hyper-realistic, commercial-grade.
