  PRODUCT_SET: "a 3-piece skincare gift set: cleanser bottle, moisturizer jar, and a folded face cloth"
  BACKGROUND_SURFACE: "a textured beige linen surface"
  ACCENT_COLOR: "soft sage green"
  ACCENT_PROPS: "a small eucalyptus sprig and a smooth river stone"
