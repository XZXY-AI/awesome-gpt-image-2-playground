  1. "[PRODUCT_1]" — a [BOTTLE_1_DESC]
  2. "[PRODUCT_2]" — a [BOTTLE_2_DESC] (positioned slightly higher in center)
  3. "[PRODUCT_3]" — a [BOTTLE_3_DESC]
