prompt: |
  A clean minimalist packaging design photograph: a front-facing rectangular cardboard
  carton of "[PRODUCT_NAME]" centered on a [BG_COLOR] background. The carton features:
  - Top half: large bold sans-serif logo "[BRAND]" in [LOGO_COLOR]
  - Center: an illustrated pictogram of [INGREDIENT_ICON] in flat 2-color style
  - Below pictogram: product variety name "[VARIETY]" in 36pt regular sans
  - Bottom: small certifications icon row (organic / non-GMO / vegan)
  - Bottom edge: net weight "[WEIGHT]" in tracked-out small caps
  Carton has a slight 3D rotation (5° toward viewer) showing a hint of the side panel.
  Soft directional lighting from upper-left at 45°, subtle but realistic shadow on the
  background. Style: Method / Magic Spoon / Olipop modern CPG aesthetic. 1:1 aspect ratio.
