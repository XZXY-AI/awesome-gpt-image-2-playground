id: ph-002
title: "Professional studio headshot — corporate / LinkedIn portrait"
title_i18n:
  zh-CN: "专业棚拍头像(商务 / LinkedIn 风格)"
category: photography
tags: [photography, portrait, headshot, studio, corporate, linkedin]
intent: "LinkedIn 头像 / 公司官网团队页 / 个人品牌头图"
prompt: |
  A professional studio portrait photograph of [SUBJECT_DESCRIPTION], shot from chest-up
  with a slight 3/4 angle (15° turn from camera). Subject is looking confidently into the
  lens with a warm, approachable expression — relaxed but composed. Wearing
  [WARDROBE_DESCRIPTION].
  Lighting: classic 3-point setup — soft key light from camera-left at 45°, fill light
  at 1/3 strength from camera-right, subtle hair light from behind to separate subject
  from background. Background: smooth seamless [BG_COLOR] paper, slightly out of focus,
  no shadows.
  Skin tones are natural and warm, no excessive retouching, every pore visible but
  flattering. Eyes are razor-sharp focus with a clear catch-light. Hair has natural
  texture, not sprayed-stiff.
  Shot on Hasselblad H6D, 100mm portrait lens, f/4, ISO 100, 1/200s. Aspect ratio 4:5.
  Style: classic editorial corporate portrait, like a Bloomberg profile or Forbes feature.
variables:
  SUBJECT_DESCRIPTION: "a confident woman in her early 40s with shoulder-length wavy auburn hair, light olive skin, hazel eyes"
  WARDROBE_DESCRIPTION: "a fitted charcoal-gray blazer over a soft cream silk blouse, single thin gold necklace"
  BG_COLOR: "warm gradient from medium gray (top) to soft warm beige (bottom)"
