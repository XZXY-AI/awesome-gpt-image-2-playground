id: il-001
title: "Children's book illustration — whimsical bedroom scene"
title_i18n:
  zh-CN: "儿童绘本插画(童趣卧室场景)"
category: illustration
tags: [illustration, childrens-book, whimsical, watercolor, narrative]
intent: "童书插画 / 教育产品配图 / 儿童 App 启动图"
prompt: |
  A warm whimsical children's book illustration in soft watercolor style. Scene:
  [SCENE_DESCRIPTION]. The protagonist is [CHARACTER_DESCRIPTION], shown
  [CHARACTER_ACTION].
  Style references: Beatrix Potter, Quentin Blake, Oliver Jeffers — gentle line work
  with subtle ink linework, watercolor washes that bleed slightly outside the lines for
  organic feel, cross-hatching for shadow texture.
  Color palette: warm off-whites, dusty rose, sage green, soft cobalt, terracotta,
  honey yellow — never neon, always muted earth tones.
  The composition is balanced but informal: small details reward second look (a [DETAIL_1],
  a [DETAIL_2], a [DETAIL_3]). Slight paper texture overlay throughout.
  Aspect ratio 4:3 (landscape book spread). Suitable for ages 3-8. Soft, magical,
  inviting bedtime-story atmosphere. No text within the image.
variables:
  SCENE_DESCRIPTION: "a cozy attic library at twilight, with a tiny rocket-ship-shaped reading nook, fairy lights strung across wooden beams, and a round window showing a moonlit forest outside"
  CHARACTER_DESCRIPTION: "a small ginger fox wearing a knitted blue scarf and round spectacles"
  CHARACTER_ACTION: "perched on a stack of leather-bound books at the round window, paws on the glass, watching a friendly cloud-shaped creature peek in from outside"
  DETAIL_1: "open picture book on the floor with a paper airplane bookmark"
  DETAIL_2: "tiny mouse peeking out from behind a teapot, holding a piece of cheese"
  DETAIL_3: "an old brass telescope tilted toward the window, with a sleeping moth on its lens"
