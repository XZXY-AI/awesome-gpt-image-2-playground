prompt: |
  A vertical 2:3 Chinese festival marketing poster for "[FESTIVAL_NAME]".
  Top 65%: a hand-painted ink-wash style illustration of [SCENE_DESCRIPTION], rendered
  in traditional Chinese painting technique with controlled brush strokes, on a textured
  rice-paper background. Limited palette: deep indigo, warm gold, burnt sienna, with
  pure white negative space. A single subtle moon or lantern as focal point.
  Bottom 35%: solid warm cream surface with crisp typography:
  Large vertical title "[CN_TITLE]" in 思源宋体 Heavy (or similar Chinese serif),
  positioned right-aligned reading top-to-bottom in traditional style, with a small red
  square seal stamp (像印章) below. Beneath: subtitle "[CN_SUBTITLE]" in horizontal
  smaller weight. Bottom corner: brand "[BRAND]" + date "[DATE]" in modern sans.
  Print quality, museum-grade composition.
