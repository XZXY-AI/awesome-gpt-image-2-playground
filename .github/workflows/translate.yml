name: Translate README

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'README_TEMPLATE.md.tpl'
      - 'prompts/_index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'chore: daily rebuild') }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile=false

      - name: Translate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pnpm translate

      - name: Commit translations
        run: |
          git config user.name "gpt-image2-bot"
          git config user.email "bot@gptimage2.veilo.dev"
          git add README_*.md
          git diff --staged --quiet || git commit -m "chore: refresh translations"
          git push
